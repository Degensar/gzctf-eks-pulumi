# Example (non-secret) configuration for the `dev` stack.
#
# Secrets (database password, GZCTF admin password) are NOT stored here — set
# them with `pulumi config set --secret ...` which writes encrypted values.
config:
  aws:region: us-east-1
  gzctf-eks:namePrefix: gzctf
  gzctf-eks:vpcCidr: 10.0.0.0/16
  gzctf-eks:azCount: "2"
  gzctf-eks:singleNatGateway: "true"
  gzctf-eks:k8sVersion: "1.32"
  gzctf-eks:nodeInstanceType: t3.large
  gzctf-eks:nodeDesiredSize: "2"
  gzctf-eks:nodeMinSize: "2"
  gzctf-eks:nodeMaxSize: "4"
  gzctf-eks:nodeDiskSize: "50"
  # Data layer (dbPassword is a secret — set via `pulumi config set --secret`)
  gzctf-eks:dbInstanceClass: db.t4g.micro
  gzctf-eks:dbEngineVersion: "16"
  gzctf-eks:dbAllocatedStorage: "20"
  gzctf-eks:dbUsername: gzctf
  gzctf-eks:dbName: gzctf
  gzctf-eks:redisNodeType: cache.t4g.micro
  gzctf-eks:redisNumCacheClusters: "1"
  # Ingress
  gzctf-eks:albChartVersion: "3.4.0"
